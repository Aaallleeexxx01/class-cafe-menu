<html lang="ro">

<head>

    content="Class Cafe · Sânnicolau Mare — meniu · menu · meni · itallap · Getränkekarte">

  <style>
    :root {
      --bg: #171210;
      --panel: #221a13;
      --line: #3a2c1e;
      --cream: #f1e7d0;
      --muted: #a4937c;
      --amber: #e2a63d;
      --red: #b23a33;
      --navy: #25324f;
      --green: #2f7048;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    html {
      -webkit-text-size-adjust: 100%
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--cream);
      background-color: var(--bg);
      background-image:
        radial-gradient(900px 480px at 50% -8%, rgba(226, 166, 61, .07), transparent 60%),
        repeating-linear-gradient(90deg, rgba(0, 0, 0, .20) 0 2px, transparent 2px 112px),
        linear-gradient(#1a1410, #131009 70%);
      background-attachment: fixed;
      min-height: 100vh;
    }

    .wrap {
      max-width: 620px;
      margin: 0 auto;
      padding: 0 18px 56px
    }

    /* ── sticky top bar ─────────────────────────────── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 60;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(19, 14, 10, .85);
      backdrop-filter: blur(9px);
      -webkit-backdrop-filter: blur(9px);
      border-bottom: 1px solid var(--line);
    }

    .brand {
      font-family: "Bebas Neue", sans-serif;
      font-size: 18px;
      letter-spacing: .12em;
      color: var(--cream);
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
    }

    .brand .star {
      color: var(--amber);
      font-size: 12px
    }

    .lang {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center
    }

    .langbtn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      cursor: pointer;
      border: 1px solid var(--line);
      background: #241b12;
      color: var(--muted);
      font-family: "Oswald", sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .12em;
      transition: background .15s, color .15s, border-color .15s;
    }

    .langbtn.active {
      background: var(--amber);
      border-color: var(--amber);
      color: #241708
    }

    /* flag hugs its own aspect ratio: fixed height, width follows the SVG viewBox */
    .flag {
      height: 12px;
      width: auto;
      border-radius: 2px;
      overflow: hidden;
      display: inline-flex;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, .35)
    }

    .flag svg {
      display: block;
      height: 12px;
      width: auto
    }

    @media (max-width:480px) {
      .topbar {
        flex-direction: column;
        gap: 8px;
        padding: 9px 10px
      }
    }

    /* ── hero ───────────────────────────────────────── */
    .hero {
      position: relative;
      text-align: center;
      padding: 26px 0 4px
    }

    .bunting {
      display: flex;
      justify-content: center;
      gap: 11px;
      position: relative;
      padding-top: 5px;
      margin-bottom: 20px
    }

    .bunting::before {
      content: "";
      position: absolute;
      top: 2px;
      left: 6%;
      right: 6%;
      height: 2px;
      background: #3d2f20;
      border-radius: 2px
    }

    .bunting i {
      width: 17px;
      height: 23px;
      margin-top: 2px;
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      filter: drop-shadow(0 2px 2px rgba(0, 0, 0, .4));
    }

    .bunting i:nth-child(3n+1) {
      background: #2f4d9b
    }

    .bunting i:nth-child(3n+2) {
      background: #e7c33b
    }

    .bunting i:nth-child(3n) {
      background: #c33b35
    }

    .dartboard {
      position: absolute;
      top: 64px;
      right: -38px;
      z-index: 0;
      width: clamp(96px, 26vw, 150px);
      aspect-ratio: 1;
      border-radius: 50%;
      transform: rotate(9deg);
      border: 9px solid #100d0a;
      box-shadow: 0 0 0 3px #2a2119, 0 14px 28px rgba(0, 0, 0, .55);
      background:
        radial-gradient(circle, #b53a31 0 7%, #2f7048 7% 12%, transparent 12%),
        radial-gradient(circle, transparent 0 37%, rgba(181, 58, 49, .92) 37% 42%, transparent 42% 58%, rgba(47, 112, 72, .92) 58% 63%, transparent 63%),
        repeating-conic-gradient(#efe4cc 0 9deg, #26221d 9deg 18deg);
      opacity: .95;
    }

    .plate {
      position: relative;
      z-index: 1;
      width: min(92%, 430px);
      margin: 0 auto;
      padding: 15px 20px 13px;
      background: linear-gradient(180deg, #f6efdd, #e7dcc2);
      border: 3px solid #262b38;
      border-radius: 12px;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, .65) inset,
        0 -4px 10px rgba(0, 0, 0, .13) inset,
        0 16px 32px rgba(0, 0, 0, .5);
      transform: rotate(-1.2deg);
    }

    .bolt {
      position: absolute;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #cfc6ae, #6f6a58 72%);
      box-shadow: 0 1px 2px rgba(0, 0, 0, .45) inset;
    }

    .bolt.tl {
      top: 7px;
      left: 9px
    }

    .bolt.tr {
      top: 7px;
      right: 9px
    }

    .bolt.bl {
      bottom: 7px;
      left: 9px
    }

    .bolt.br {
      bottom: 7px;
      right: 9px
    }

    .plate-top {
      font-family: "Oswald", sans-serif;
      font-weight: 600;
      font-size: 11px;
      letter-spacing: .32em;
      color: var(--red)
    }

    .plate-main {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(46px, 13vw, 68px);
      line-height: .95;
      letter-spacing: .05em;
      color: var(--navy);
      margin-top: 3px;
      text-shadow: 0 1px 0 #fff, 0 3px 2px rgba(0, 0, 0, .28);
    }

    .plate-bot {
      font-family: "Oswald", sans-serif;
      font-weight: 600;
      font-size: 10.5px;
      letter-spacing: .42em;
      color: #5a5140;
      margin-top: 5px
    }

    .tagline {
      font-family: "Oswald", sans-serif;
      font-weight: 500;
      font-size: 13px;
      letter-spacing: .34em;
      text-transform: uppercase;
      color: var(--amber);
      margin-top: 20px
    }

    .subnote {
      font-size: 12px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 7px
    }

    /* ── ticker ─────────────────────────────────────── */
    .ticker {
      margin: 22px -18px 2px;
      padding: 8px 0;
      overflow: hidden;
      border-block: 1px solid var(--line);
      background: rgba(0, 0, 0, .27)
    }

    .ticker-track {
      display: flex;
      width: max-content;
      white-space: nowrap;
      animation: tick 38s linear infinite
    }

    .tick-seg {
      font-family: "Oswald", sans-serif;
      font-weight: 600;
      font-size: 11px;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: #8d7c63;
      padding-right: .3em;
    }

    @keyframes tick {
      to {
        transform: translateX(-50%)
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .ticker-track {
        animation: none
      }
    }

    /* ── menu sections ──────────────────────────────── */
    .sec {
      margin-top: 32px
    }

    .sec-h {
      display: flex;
      align-items: center;
      gap: 13px;
      margin-bottom: 8px
    }

    .rule {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--line))
    }

    .rule.flip {
      background: linear-gradient(90deg, var(--line), transparent)
    }

    .sec-t {
      font-family: "Oswald", sans-serif;
      font-weight: 600;
      font-size: 14.5px;
      letter-spacing: .26em;
      text-transform: uppercase;
      color: var(--amber);
      display: flex;
      align-items: center;
      gap: 9px;
      text-align: center;
    }

    .sec-t .ic {
      font-size: 16px;
      letter-spacing: 0
    }

    .row {
      padding: 9px 0
    }

    .line {
      display: flex;
      align-items: baseline;
      gap: 9px
    }

    .iname {
      font-weight: 600;
      font-size: 14.5px;
      letter-spacing: .045em;
      text-transform: uppercase;
      color: var(--cream)
    }

    .dots {
      flex: 1;
      min-width: 18px;
      border-bottom: 2px dotted #4d3b26;
      transform: translateY(-4px)
    }

    .iprice {
      font-family: "Oswald", sans-serif;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: .04em;
      color: var(--amber);
      white-space: nowrap
    }

    .imeta {
      font-size: 12.5px;
      line-height: 1.5;
      color: var(--muted);
      margin-top: 3px;
      padding-right: 8px
    }

    .line.pour {
      margin-top: 3px
    }

    .iname-sub {
      font-size: 12.5px;
      letter-spacing: .03em;
      color: var(--muted)
    }

    /* ── footer ─────────────────────────────────────── */
    footer {
      margin-top: 48px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      text-align: center;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 2
    }

    footer .fbrand {
      font-family: "Bebas Neue", sans-serif;
      font-size: 15px;
      letter-spacing: .16em;
      color: #c9b795
    }

    button:focus-visible {
      outline: 2px solid var(--amber);
      outline-offset: 2px
    }
  </style>
</head>

      /* ═══════════════ sfârșit date meniu / end of menu data ═════ */

      function $(s) { return document.querySelector(s); }
      function esc(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;"); }
      function t(o) { return o[lang] || o.ro; }
      function dec(s) { return lang === "en" ? s : s.replace(".", ","); }
      function priceTxt(p) { return dec(p.toFixed(2)) + " lei"; }
      function alcTxt(a) {
        var s = (a === 0) ? "0.0" : (Number.isInteger(a) ? String(a) : a.toFixed(1));
        return ALC_LABEL[lang] + " " + dec(s) + "% vol";
      }
      function metaOf(it) {
        if (it.metaText) return esc(t(it.metaText));
        var parts = [];
        if (it.desc) parts.push(esc(t(it.desc)));
        if (typeof it.alc === "number") parts.push(alcTxt(it.alc));
        if (it.vol) parts.push(esc(it.vol));
        return parts.join(" · ");
      }

      function render() {
        document.documentElement.lang = HTML_LANG[lang];

        $("#menu").innerHTML = MENU.map(function (sec) {
          var rows = sec.items.map(function (it) {
            var m = metaOf(it);
            if (it.pours) {
              var pourLines = it.pours.map(function (p) {
                return '<div class="line pour">'
                  + '<span class="iname-sub">' + esc(p.vol) + '</span>'
                  + '<span class="dots"></span>'
                  + '<span class="iprice">' + priceTxt(p.price) + '</span>'
                  + '</div>';
              }).join("");
              return '<div class="row">'
                + '<div class="line"><span class="iname">' + esc(t(it.name)) + '</span></div>'
                + pourLines
                + (m ? '<div class="imeta">' + m + '</div>' : '')
                + '</div>';
            }
            return '<div class="row">'
              + '<div class="line">'
              + '<span class="iname">' + esc(t(it.name)) + '</span>'
              + '<span class="dots"></span>'
              + '<span class="iprice">' + priceTxt(it.price) + '</span>'
              + '</div>'
              + (m ? '<div class="imeta">' + m + '</div>' : '')
              + '</div>';
          }).join("");
          return '<section class="sec">'
            + '<div class="sec-h">'
            + '<span class="rule flip"></span>'
            + '<h2 class="sec-t"><span class="ic">' + sec.icon + '</span>' + esc(t(sec.name)) + '</h2>'
            + '<span class="rule"></span>'
            + '</div>'
            + rows
            + '</section>';
        }).join("");

        document.querySelectorAll("[data-i]").forEach(function (el) {
          el.textContent = I18N[el.dataset.i][lang];
        });

        var tickText = I18N.tick[lang].repeat(4);
        document.querySelectorAll(".tick-seg").forEach(function (el) { el.textContent = tickText; });

        document.querySelectorAll(".langbtn").forEach(function (b) {
          var on = b.dataset.lang === lang;
          b.classList.toggle("active", on);
          b.setAttribute("aria-pressed", String(on));
        });
      }

      function setLang(l) {
        lang = l;
        try { history.replaceState(null, "", "#" + l); } catch (e) { }
        render();
      }

      document.querySelectorAll(".langbtn").forEach(function (b) {
        b.addEventListener("click", function () { setLang(b.dataset.lang); });
      });

      render();
    })();
